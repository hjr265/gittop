name: Nix Build

on:
  push:
    paths:
      - "flake.nix"
      - "flake.lock"
      - "**.go"
      - "go.mod"
      - "go.sum"
  pull_request:
    paths:
      - "flake.nix"
      - "flake.lock"
      - "**.go"
      - "go.mod"
      - "go.sum"

jobs:
  nix-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31

      - run: nix build --print-build-logs
